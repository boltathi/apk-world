<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="#fbbf24" stroke-width="6" opacity="0.2"/>
  <!-- Stylized "A" letterform as a flame/bolt shape -->
  <path d="M256 80 L330 320 L290 320 L270 260 L242 260 L222 320 L182 320 Z" fill="url(#amber)"/>
  <!-- Crossbar -->
  <rect x="222" y="220" width="68" height="16" rx="4" fill="#030712"/>
  <!-- Dot / spark -->
  <circle cx="256" cy="140" r="10" fill="#fef3c7" opacity="0.9"/>
  <!-- "APK World" text -->
  <text x="256" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="56" fill="#fbbf24" letter-spacing="4">APK World</text>
</svg>
